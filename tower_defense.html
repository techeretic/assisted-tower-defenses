<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Friendly Tower Defense</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
            overflow: hidden;
        }
        
        h1 { margin: 10px 0; font-size: 1.5rem; text-align: center; }

        #game-container {
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 800px;
            height: 600px;
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: #4a4a4a;
            cursor: crosshair;
            border: 2px solid #555;
            display: block;
        }

        #ui-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            background-color: #333;
            padding: 10px;
            box-sizing: border-box;
            gap: 10px;
            border-top: 2px solid #555;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 1rem;
        }

        .stat-box { display: flex; gap: 15px; }
        .stat { font-weight: bold; }
        .money { color: #f1c40f; }
        .lives { color: #e74c3c; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            min-width: 120px;
            font-size: 0.9rem;
            touch-action: manipulation;
            transition: 0.1s;
        }

        button:active { transform: scale(0.95); }
        
        .btn-tower1 { background-color: #3498db; color: white; }
        .btn-tower2 { background-color: #e74c3c; color: white; }
        .btn-tower3 { background-color: #f39c12; color: black; }
        .btn-tower4 { background-color: #9b59b6; color: white; }
        .btn-wave { background-color: #f1c40f; color: black; font-size: 1.2rem; flex: 2; }
        .btn-pause { background-color: #95a5a6; color: white; flex: 1; }
        .btn-save { background-color: #27ae60; color: white; flex: 1; }
        .btn-clear { background-color: #c0392b; color: white; flex: 1; }
        .btn-sound { background-color: #7f8c8d; color: white; flex: 1; }
        button.active { box-shadow: 0 0 15px white; border: 2px solid white; }

        #game-over {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            border: 2px solid white;
            width: 80%;
            display: none;
            z-index: 100;
        }
        button.restart { background-color: #2ecc71; color: white; width: 100%; margin-top: 15px; }

        .settings-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 100;
        }
        .settings-overlay.active { display: block; }
        
        .settings-content {
            background: #333;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid white;
            width: 100%;
            max-width: 400px;
            margin: 20% auto;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            font-size: 1.2rem;
        }
        
        .settings-toggle {
            padding: 8px 16px;
            background: #7f8c8d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .settings-toggle.on { background: #27ae60; }

        .mobile-hint {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1> defenses</h1>
    <div class="mobile-hint">Tap empty spots to build towers</div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="settings-overlay" id="settings-overlay">
            <div class="settings-content">
                <h2>Settings</h2>
                <div class="setting-row">
                    <span>Sound Effects</span>
                    <button id="settings-sound" class="settings-toggle" onclick="toggleSound()">ON</button>
                </div>
                <button class="restart" onclick="toggleSettings()">Close</button>
            </div>
        </div>

        <div id="game-over">
            <h2 style="color: #e74c3c; font-size: 3rem; margin: 0;">GAME OVER</h2>
            <p id="final-score" style="font-size: 1.5rem; margin: 20px 0;">Waves Survived: 0</p>
            <button class="restart" onclick="location.reload()">Play Again</button>
        </div>

        <div id="ui-bar">
            <div class="top-bar">
                <div class="stat-box">
                    <span class="stat">Lives: <span id="lives" class="lives">20</span></span>
                    <span class="stat">Money: <span id="money" class="money">$100</span></span>
                </div>
                <div class="stat">
                    Wave: <span id="wave" class="stat">1</span>
                </div>
            </div>
            
            <div class="controls">
                <button id="btn-tower1" class="btn-tower1 active" onclick="selectTower(1)">Basic<br><small>$50</small></button>
                <button id="btn-tower2" class="btn-tower2" onclick="selectTower(2)">Sniper<br><small>$120</small></button>
                <button id="btn-tower3" class="btn-tower3" onclick="selectTower(3)">Rapid<br><small>$80</small></button>
                <button id="btn-tower4" class="btn-tower4" onclick="selectTower(4)">AOE<br><small>$150</small></button>
                <button id="btn-wave" class="btn-wave" onclick="startWave()">Start Wave</button>
                <button id="btn-pause" class="btn-pause" onclick="togglePause()">Pause</button>
                <button id="btn-save" class="btn-save" onclick="saveGame()">Save</button>
                <button id="btn-clear" class="btn-clear" onclick="clearTowers()">Clear</button>
                <button id="btn-sound" class="btn-sound" onclick="toggleSound()">Sound: OFF</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        // Game State
        let money = 100;
        let lives = 20;
        let wave = 1;
        let gameActive = true;
        let paused = false;
        let enemies = [];
        let towers = [];
        let projectiles = [];
        let particles = [];
        let powerups = [];
        let floatingTexts = [];
        let audioCtx = null;
        let soundEnabled = false;
        let settingsOpen = false;
        let selectedTowerType = 1;
        let enemiesToSpawn = 0;
        let spawning = false;
        let waveActive = false;

        // Map Path
        const path = [
            {x: 0, y: 100},
            {x: 200, y: 100},
            {x: 200, y: 400},
            {x: 400, y: 400},
            {x: 400, y: 200},
            {x: 600, y: 200},
            {x: 600, y: 500},
            {x: 800, y: 500}
        ];

        function generateRandomPath() {
            const newPath = [{x: 0, y: 100}];
            let x = 0;
            let y = 100;
            while (x < 800) {
                const nextX = x + 50 + Math.random() * 150;
                if (nextX >= 800) {
                    newPath.push({x: 800, y: y});
                    break;
                }
                const nextY = y + (Math.random() - 0.5) * 200;
                y = Math.max(50, Math.min(550, nextY));
                newPath.push({x: nextX, y: y});
                x = nextX;
            }
            return newPath;
        }

        let gamePaths = [path];

        const towerTypes = {
            1: { name: "Basic", cost: 50, range: 150, damage: 20, cooldown: 40, color: "#3498db", projSpeed: 7, size: 10, damageType: "single" },
            2: { name: "Sniper", cost: 120, range: 300, damage: 100, cooldown: 120, color: "#e74c3c", projSpeed: 15, size: 6, damageType: "single" },
            3: { name: "Rapid", cost: 80, range: 120, damage: 10, cooldown: 15, color: "#f39c12", projSpeed: 10, size: 8, damageType: "single" },
            4: { name: "AOE", cost: 150, range: 100, damage: 30, cooldown: 60, color: "#9b59b6", projSpeed: 5, size: 14, damageType: "area", areaRadius: 80 }
        };

        function drawPath() {
            ctx.lineWidth = 40;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#5d4037';
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }
            ctx.stroke();

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#8d6e63';
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        class Enemy {
            constructor(waveDifficulty, type = 'normal') {
                this.pathIndex = 0;
                this.x = path[0].x;
                this.y = path[0].y;
                this.radius = 12;
                this.type = type;
                this.boss = false;
                this.lastDamageTime = 0;

                if (type === 'fast') {
                    this.radius = 8;
                    this.speed = 3 + (waveDifficulty * 0.1);
                    this.health = 50 + (waveDifficulty * 25);
                    this.reward = 20 + (waveDifficulty * 5);
                } else if (type === 'tank') {
                    this.radius = 18;
                    this.speed = 0.8 + (waveDifficulty * 0.05);
                    this.health = 200 + (waveDifficulty * 75);
                    this.reward = 25 + (waveDifficulty * 10);
                } else if (type === 'flying') {
                    this.radius = 10;
                    this.speed = 2 + (waveDifficulty * 0.1);
                    this.health = 80 + (waveDifficulty * 40);
                    this.reward = 30 + (waveDifficulty * 8);
                } else {
                    this.speed = 1.5 + (waveDifficulty * 0.1);
                    this.health = 100 + (waveDifficulty * 50);
                    this.reward = 15 + (waveDifficulty * 5);
                }

                if (type === 'boss') {
                    this.radius = 25;
                    this.speed = 0.5 + (waveDifficulty * 0.05);
                    this.health = 500 + (waveDifficulty * 200);
                    this.reward = 100 + (waveDifficulty * 50);
                    this.boss = true;
                }
                this.maxHealth = this.health;
            }

            update() {
                const target = path[this.pathIndex + 1];
                if (!target) return;
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const moveStep = this.speed;

                if (dist <= moveStep) {
                    this.x = target.x;
                    this.y = target.y;
                    this.pathIndex++;
                    if (this.pathIndex >= path.length - 1) {
                        this.reachEnd();
                    }
                } else {
                    this.x += (dx / dist) * moveStep;
                    this.y += (dy / dist) * moveStep;
                }
            }

            draw() {
                if (this.boss) {
                    ctx.fillStyle = '#c0392b';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('BOSS', this.x, this.y);
                } else {
                    ctx.fillStyle = this.type === 'flying' ? '#3498db' : '#8e44ad';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    if (this.type === 'tank') {
                        ctx.strokeStyle = '#e74c3c';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    } else if (this.type === 'fast') {
                        ctx.fillStyle = '#2ecc71';
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y - this.radius);
                        ctx.lineTo(this.x - 5, this.y + this.radius);
                        ctx.lineTo(this.x + 5, this.y + this.radius);
                        ctx.fill();
                    } else if (this.type === 'flying') {
                        ctx.fillStyle = '#f1c40f';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y + 5, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                const hpPercent = this.health / this.maxHealth;
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x - 10, this.y - 20, 20, 4);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(this.x - 10, this.y - 20, 20 * hpPercent, 4);
            }

            takeDamage(amount) {
                this.health -= amount;
                const now = Date.now();
                if (now - this.lastDamageTime > 500) {
                    showFloatingText(this.x, this.y - 20, amount, this.boss ? '#e74c3c' : '#ffffff');
                    this.lastDamageTime = now;
                }
                if (this.health <= 0) {
                    money += this.reward;
                    if (this.boss) {
                        createParticles(this.x, this.y, '#e74c3c');
                        money += 500;
                        showFloatingText(this.x, this.y, 'BOSS DEFEATED!', '#e74c3c');
                    } else if (this.type === 'flying') {
                        createParticles(this.x, this.y, '#3498db');
                    } else if (this.type === 'tank') {
                        createParticles(this.x, this.y, '#e74c3c');
                    } else {
                        createParticles(this.x, this.y, '#8e44ad');
                    }
                    updateUI();
                }
            }

            reachEnd() {
                this.health = 0;
                lives--;
                updateUI();
                if (lives <= 0) endGame();
            }
        }

        class Tower {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.stats = towerTypes[type];
                this.cooldownTimer = 0;
                this.angle = 0;
            }

            update() {
                if (this.cooldownTimer > 0) this.cooldownTimer--;
                let nearestEnemy = null;
                let minDistance = this.stats.range;

                enemies.forEach(enemy => {
                    const dx = enemy.x - this.x;
                    const dy = enemy.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < minDistance) {
                        minDistance = dist;
                        nearestEnemy = enemy;
                    }
                });

                if (nearestEnemy) {
                    this.angle = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                    if (this.cooldownTimer <= 0) {
                        this.shoot(nearestEnemy);
                        this.cooldownTimer = this.stats.cooldown;
                        playSound('shoot');
                    }
                }
            }

            shoot(target) {
                projectiles.push(new Projectile(this.x, this.y, target, this.stats));
            }

            draw() {
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.stats.color;
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#bdc3c7';
                ctx.fillRect(0, -4, 25, 8);
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, target, stats) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.speed = stats.projSpeed;
                this.damage = stats.damage;
                this.color = stats.color;
                this.radius = 4;
                this.active = true;
                this.damageType = stats.damageType || 'single';
                this.areaRadius = stats.areaRadius || 0;
                const dx = target.x - x;
                const dy = target.y - y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                this.vx = (dx / dist) * this.speed;
                this.vy = (dy / dist) * this.speed;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                const dx = this.x - this.target.x;
                const dy = this.y - this.target.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < this.target.radius + this.radius) {
                    this.target.takeDamage(this.damage);
                    if (this.damageType === 'area') {
                        this.explode();
                    }
                    this.active = false;
                    if(this.damage >= 50) createParticles(this.x, this.y, '#f1c40f');
                }
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.active = false;
                }
            }

            explode() {
                enemies.forEach(enemy => {
                    const dx = enemy.x - this.x;
                    const dy = enemy.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist <= this.areaRadius) {
                        enemy.takeDamage(this.damage);
                    }
                });
                createParticles(this.x, this.y, this.color);
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 4 - 2;
                this.speedY = Math.random() * 4 - 2;
                this.life = 1.0;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.05;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.active = true;
                const types = ['money', 'heal', 'damage'];
                this.type = types[Math.floor(Math.random() * types.length)];
                this.life = 600;
            }
            update() {
                this.life--;
                if (this.life <= 0) this.active = false;
            }
            draw() {
                if (this.type === 'money') {
                    ctx.fillStyle = '#f1c40f';
                } else if (this.type === 'heal') {
                    ctx.fillStyle = '#2ecc71';
                } else {
                    ctx.fillStyle = '#e74c3c';
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = 'white';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type[0].toUpperCase(), this.x, this.y);
            }
        }

        class FloatingText {
            constructor(x, y, text, color = 'white') {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.life = 1.0;
                this.speedY = -1;
            }
            update() {
                this.y += this.speedY;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0;
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push(new Particle(x, y, color));
            }
            if (Math.random() < 0.2) {
                powerups.push(new PowerUp(x, y));
            }
            vibrate(30);
        }

        function showFloatingText(x, y, text, color) {
            floatingTexts.push(new FloatingText(x, y, text, color));
        }

        function vibrate(duration) {
            if (navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'shoot') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'enemyHit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
                vibrate(50);
            } else if (type === 'explosion') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
                vibrate(200);
            } else if (type === 'waveStart') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.2);
                osc.frequency.linearRampToValueAtTime(800, now + 0.4);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            initAudio();
            document.getElementById('btn-sound').innerText = soundEnabled ? "Sound: ON" : "Sound: OFF";
            document.getElementById('btn-sound').style.backgroundColor = soundEnabled ? "#27ae60" : "#7f8c8d";
            document.getElementById('settings-sound').innerText = soundEnabled ? "ON" : "OFF";
            document.getElementById('settings-sound').className = soundEnabled ? "settings-toggle on" : "settings-toggle";
        }

        function toggleSettings() {
            settingsOpen = !settingsOpen;
            document.getElementById('settings-overlay').classList.toggle('active', settingsOpen);
        }

        function resizeCanvas() {
            canvas.style.width = '100%';
        }

        function getCanvasCoordinates(event) {
            const rect = canvas.getBoundingClientRect();
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handleInput(e) {
            if (!gameActive || paused) return;
            e.preventDefault();
            const { x, y } = getCanvasCoordinates(e);
            
            if (isOnPath(x, y)) return;
            
            const towerData = towerTypes[selectedTowerType];
            if (money >= towerData.cost) {
                towers.push(new Tower(x, y, selectedTowerType));
                money -= towerData.cost;
                updateUI();
            }
        }

        function isOnPath(x, y) {
            for (let i = 0; i < path.length - 1; i++) {
                const p1 = path[i];
                const p2 = path[i+1];
                const A = x - p1.x;
                const B = y - p1.y;
                const C = p2.x - p1.x;
                const D = p2.y - p1.y;
                const dot = A * C + B * D;
                const len_sq = C * C + D * D;
                let param = -1;
                if (len_sq != 0) param = dot / len_sq;
                let xx, yy;
                if (param < 0) { xx = p1.x; yy = p1.y; }
                else if (param > 1) { xx = p2.x; yy = p2.y; }
                else { xx = p1.x + param * C; yy = p1.y + param * D; }
                const dx = x - xx;
                const dy = y - yy;
                if (Math.sqrt(dx * dx + dy * dy) < 30) return true;
            }
            return false;
        }

        function selectTower(type) {
            selectedTowerType = type;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            const btnId = type === 1 ? 'btn-tower1' : type === 2 ? 'btn-tower2' : type === 3 ? 'btn-tower3' : 'btn-tower4';
            document.getElementById(btnId).classList.add('active');
        }

        function startWave() {
            if (waveActive) return;
            waveActive = true;
            enemiesToSpawn = 5 + (wave * 2);
            spawning = true;
            
            let normalSpawned = 0;
            let fastSpawned = 0;
            let tankSpawned = 0;
            let flyingSpawned = 0;
            
            const spawnInterval = setInterval(() => {
                if (enemiesToSpawn > 0) {
                    let enemyType = 'normal';
                    
                    if (wave % 10 === 0 && normalSpawned === 0) {
                        enemyType = 'boss';
                        normalSpawned++;
                    } else if (wave >= 3 && Math.random() < 0.2) {
                        enemyType = 'fast';
                        fastSpawned++;
                    } else if (wave >= 5 && Math.random() < 0.15) {
                        enemyType = 'tank';
                        tankSpawned++;
                    } else if (wave >= 7 && Math.random() < 0.1) {
                        enemyType = 'flying';
                        flyingSpawned++;
                    } else {
                        normalSpawned++;
                    }
                    
                    enemies.push(new Enemy(wave, enemyType));
                    enemiesToSpawn--;
                    playSound('enemyHit');
                } else {
                    clearInterval(spawnInterval);
                    spawning = false;
                    playSound('waveStart');
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('lives').innerText = lives;
            document.getElementById('money').innerText = money;
            document.getElementById('wave').innerText = wave;
            document.getElementById('btn-wave').disabled = waveActive || spawning || paused;
            if (!waveActive && !spawning && !paused) {
                document.getElementById('btn-wave').innerText = "Start Wave " + wave;
            }
        }

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = "You reached Wave " + wave;
            document.getElementById('btn-wave').disabled = true;
        }

        function togglePause() {
            if (!gameActive) return;
            paused = !paused;
            const btn = document.getElementById('btn-pause');
            btn.innerText = paused ? "Resume" : "Pause";
            btn.style.backgroundColor = paused ? "#f1c40f" : "#95a5a6";
        }

        function saveGame() {
            const saveData = {
                money: money,
                lives: lives,
                wave: wave,
                towers: towers.map(t => ({x: t.x, y: t.y, type: t.type})),
                enemies: enemies.map(e => ({x: e.x, y: e.y, health: e.health, pathIndex: e.pathIndex, type: e.type})),
                waveActive: waveActive,
                paused: paused,
                selectedTowerType: selectedTowerType
            };
            localStorage.setItem('towerDefenseSave', JSON.stringify(saveData));
            const btn = document.getElementById('btn-save');
            const originalText = btn.innerText;
            btn.innerText = "Saved!";
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        function clearTowers() {
            towers = [];
            money = Math.min(money + 25, 9999);
            updateUI();
            const btn = document.getElementById('btn-clear');
            const originalText = btn.innerText;
            btn.innerText = "Towers Cleared";
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        function loadGame() {
            const saveData = localStorage.getItem('towerDefenseSave');
            if (!saveData) return false;
            try {
                const data = JSON.parse(saveData);
                money = data.money;
                lives = data.lives;
                wave = data.wave;
                selectedTowerType = data.selectedTowerType || 1;
                waveActive = data.waveActive || false;
                paused = data.paused || false;
                towers = data.towers.map(t => new Tower(t.x, t.y, t.type));
                enemies = data.enemies.map(e => {
                    const enemy = new Enemy(1, e.type || 'normal');
                    enemy.x = e.x;
                    enemy.y = e.y;
                    enemy.pathIndex = e.pathIndex;
                    enemy.health = e.health;
                    enemy.maxHealth = e.health;
                    return enemy;
                });
                updateUI();
                if (paused) togglePause();
                return true;
            } catch (e) {
                return false;
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            if (paused) {
                requestAnimationFrame(gameLoop);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPath();

            towers.forEach(tower => { tower.update(); tower.draw(); });

            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.update();
                enemy.draw();
                if (enemy.health <= 0) {
                    money += enemy.reward;
                    enemies.splice(i, 1);
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let proj = projectiles[i];
                proj.update();
                proj.draw();
                if (!proj.active) projectiles.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                let p = powerups[i];
                p.update();
                p.draw();
                if (!p.active) {
                    powerups.splice(i, 1);
                    continue;
                }
                enemies.forEach(enemy => {
                    const dx = enemy.x - p.x;
                    const dy = enemy.y - p.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < enemy.radius + p.radius && p.active) {
                        if (p.type === 'money') money += 50;
                        else if (p.type === 'heal') lives += 5;
                        else if (p.type === 'damage') enemies.forEach(e => e.takeDamage(25));
                        p.active = false;
                        updateUI();
                    }
                });
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.update();
                ft.draw();
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }

            if (enemies.length === 0 && !spawning && waveActive) {
                waveActive = false;
                wave++;
                updateUI();
                document.getElementById('btn-wave').disabled = false;
                document.getElementById('btn-wave').innerText = "Start Wave " + wave;
            }

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput, {passive: false});
        
        updateUI();
        console.log("Checking loadGame...");
        if (!loadGame()) {
            gameLoop();
        }
    </script>
</body>
</html>
